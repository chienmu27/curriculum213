<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>班級點名簿</title>

  <style>
    :root{
      --leaf:#2f8f5b;
      --leaf2:#58c27d;
      --moss:#1f6f47;
      --sun:#ffe88a;
      --sky:#bfe9ff;
      --soil:#7a5b3a;
      --flower:#ff6fb2;
      --flower2:#ff9ccf;
      --berry:#ff4d6d;

      --card: rgba(255,255,255,.78);
      --card2: rgba(255,255,255,.92);
      --line: rgba(46, 143, 91, .18);
      --shadow: 0 18px 50px rgba(31, 111, 71, .12);

      --text:#2c3b2f;
      --muted:#58725f;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: "Microsoft JhengHei", system-ui, -apple-system, Segoe UI, sans-serif;
      color: var(--text);
      padding: 18px 12px;
      min-height:100vh;

      /* 水平置中、垂直靠上 */
      display:flex;
      align-items:flex-start;
      justify-content:center;

      /* 春天大自然背景 */
      background:
        radial-gradient(circle at 12% 10%, rgba(255, 232, 138, .75) 0 18%, transparent 19%),
        radial-gradient(circle at 82% 18%, rgba(191, 233, 255, .75) 0 20%, transparent 21%),
        radial-gradient(circle at 18% 82%, rgba(88, 194, 125, .30) 0 22%, transparent 23%),
        radial-gradient(circle at 86% 86%, rgba(255, 156, 207, .28) 0 22%, transparent 23%),
        linear-gradient(135deg, #f3fff6 0%, #f8feff 45%, #fff9f2 100%);
      overflow-x:hidden;
      position:relative;
    }

    /* 飄浮小花粉點點 */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.6;
      background-image:
        radial-gradient(circle, rgba(47,143,91,.18) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(255,111,178,.18) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(191,233,255,.20) 0 2px, transparent 3px);
      background-size: 140px 140px, 190px 190px, 230px 230px;
      background-position: 0 0, 60px 90px, 110px 40px;
      filter: blur(.2px);
    }

    /* 上方雲朵 + 草地氛圍層 */
    body::after{
      content:"";
      position:fixed;
      inset:-90px;
      pointer-events:none;
      opacity:.45;
      background:
        radial-gradient(ellipse at 25% 20%, rgba(255,255,255,.65) 0 16%, transparent 17%),
        radial-gradient(ellipse at 70% 18%, rgba(255,255,255,.55) 0 14%, transparent 15%),
        radial-gradient(ellipse at 40% 24%, rgba(255,255,255,.40) 0 12%, transparent 13%),
        radial-gradient(circle at 15% 92%, rgba(47,143,91,.18) 0 18%, transparent 19%),
        radial-gradient(circle at 85% 92%, rgba(88,194,125,.16) 0 18%, transparent 19%);
      animation: springDrift 10s ease-in-out infinite;
      filter: blur(.6px);
    }

    @keyframes springDrift{
      0%{ transform: translateY(0px); }
      50%{ transform: translateY(14px); }
      100%{ transform: translateY(0px); }
    }

    .card{
      width:min(600px, 100%);
      margin: 12px auto 24px;
      background: var(--card);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(47,143,91,.20);
      padding: 22px 18px 18px;
      border-radius: 26px;
      box-shadow: var(--shadow);
      position:relative;
      overflow:hidden;
    }

    /* 卡片右上角：葉子裝飾 */
    .card::before{
      content:"";
      position:absolute;
      top:-85px;
      right:-85px;
      width:220px;
      height:220px;
      background:
        radial-gradient(circle at 35% 35%, rgba(88,194,125,.28), transparent 55%),
        radial-gradient(circle at 65% 55%, rgba(47,143,91,.24), transparent 55%),
        radial-gradient(circle at 45% 70%, rgba(255,156,207,.20), transparent 55%);
      border-radius:50%;
      transform: rotate(18deg);
      pointer-events:none;
    }

    /* 卡片左下角：小花草 */
    .card::after{
      content:"";
      position:absolute;
      bottom:-95px;
      left:-95px;
      width:240px;
      height:240px;
      background:
        radial-gradient(circle at 45% 45%, rgba(191,233,255,.22), transparent 55%),
        radial-gradient(circle at 55% 55%, rgba(255,232,138,.22), transparent 55%),
        radial-gradient(circle at 40% 70%, rgba(255,111,178,.18), transparent 55%);
      border-radius:50%;
      pointer-events:none;
      transform: rotate(-10deg);
    }

    h2{
      text-align:center;
      margin: 2px 0 14px;
      font-size: 26px;
      letter-spacing: .6px;
      color: #1f6f47;
      text-shadow: 0 10px 22px rgba(31, 111, 71, .14);
    }

    /* 標題：花朵小圖示 */
    h2::before{
      content:"🌿";
      margin-right: 8px;
    }
    h2::after{
      content:"🌸";
      margin-left: 8px;
    }

    p{
      margin: 10px 0 12px;
      color: var(--muted);
    }

    .section{
      background: var(--card2);
      padding: 14px 14px;
      border-radius: 18px;
      margin-bottom: 14px;
      border: 1px solid rgba(47,143,91,.18);
      box-shadow: 0 12px 22px rgba(31, 111, 71, .07);
      position:relative;
    }

    .btn-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button{
      padding: 12px 12px;
      border: none;
      border-radius: 18px;
      cursor:pointer;
      font-weight: 900;
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
      position:relative;
      overflow:hidden;
      user-select:none;
      isolation:isolate;
    }

    button:active{
      transform: translateY(1px) scale(.99);
    }

    /* ====== hover 飄蟲效果（小瓢蟲飛過） ====== */
    button::after{
      content:"🐞";
      position:absolute;
      left:-22px;
      top: 50%;
      transform: translateY(-50%) translateX(0);
      opacity: 0;
      pointer-events:none;
      z-index:2;
      filter: drop-shadow(0 10px 12px rgba(0,0,0,.12));
    }

    button:hover::after{
      opacity: 1;
      animation: ladybugFly 1.05s ease-in-out infinite;
    }

    @keyframes ladybugFly{
      0%{ transform: translateY(-50%) translateX(-10px) rotate(-10deg); }
      50%{ transform: translateY(-62%) translateX(60%) rotate(10deg); }
      100%{ transform: translateY(-50%) translateX(120%) rotate(-6deg); }
    }

    /* 按鈕 hover 微浮起 + 光暈 */
    button:hover{
      transform: translateY(-1px);
      box-shadow: 0 18px 36px rgba(31, 111, 71, .16);
      filter: brightness(1.03);
    }

    /* ====== 按鈕花朵 icon（每個按鈕左側） ====== */
    button .ico{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      margin-right: 8px;
      background: rgba(255,255,255,.65);
      border: 1px solid rgba(47,143,91,.18);
      box-shadow: 0 10px 16px rgba(31,111,71,.08);
      transform: translateY(1px);
      flex: 0 0 auto;
    }
    button .label{
      display:inline-flex;
      align-items:center;
      gap: 6px;
    }

    /* 班級按鈕 */
    .btn-club{
      background: linear-gradient(135deg, #eafff1, #ffffff);
      color: #1f6f47;
      font-size: 16px;
      border: 1px solid rgba(47,143,91,.18);
    }

    /* 上方返回 */
    .btn-back{
      background: linear-gradient(135deg, #ffffff, #f1fff7);
      color: #1f6f47;
      border: 1px solid rgba(47,143,91,.18);
      width:100%;
      margin-bottom: 14px;
    }

    /* 出席 / 請假 */
    .btn-submit{
      background: linear-gradient(135deg, #2fd38d, #c8ffe7);
      color: #0b4a2e;
      width:100%;
      font-size: 18px;
      border: 1px solid rgba(47,143,91,.18);
    }

    .btn-leave{
      background: linear-gradient(135deg, #ffd36a, #fff0bf);
      color: #5b3200;
      width:100%;
      font-size: 18px;
      border: 1px solid rgba(122, 91, 58, .12);
    }

    .btn-danger{
      background: linear-gradient(135deg, #fff0f4, #ffffff);
      color: var(--berry);
      width:100%;
      margin-top: 10px;
      border: 1px solid rgba(255, 77, 109, .25);
    }

    .btn-outline-danger{
      background: #fff;
      color: var(--berry);
      border: 1px solid rgba(255, 77, 109, .45);
      padding: 5px 8px;
      font-size: 11px;
      border-radius: 12px;
      box-shadow: 0 10px 16px rgba(255, 77, 109, .08);
      transition: .18s;
    }
    .btn-outline-danger:hover{
      box-shadow: 0 16px 22px rgba(255, 77, 109, .12);
      transform: translateY(-1px);
    }

    /* ====== Tabs：植物動畫 ====== */
    .tabs{
      display:flex;
      gap: 10px;
      margin: 10px 0 16px;
      padding: 6px;
      border-radius: 22px;
      background: rgba(255,255,255,.80);
      border: 1px solid rgba(47,143,91,.18);
      box-shadow: 0 12px 20px rgba(31,111,71,.08);
    }

    .tab{
      flex:1;
      padding: 12px 10px;
      text-align:center;
      cursor:pointer;
      color: #4e6b57;
      font-weight: 900;
      border-radius: 18px;
      transition: .18s;
      position:relative;
      user-select:none;
      overflow:hidden;
    }

    /* tab 左側：小芽 */
    .tab::before{
      content:"🌱";
      position:absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%) scale(.95);
      opacity:.6;
      transition: .18s;
    }

    /* tab active：葉子生長 */
    .tab.active{
      color: #1f6f47;
      background: linear-gradient(135deg, #eafff1, #ffffff);
      box-shadow: 0 14px 22px rgba(31,111,71,.12);
      border: 1px solid rgba(47,143,91,.18);
    }

    .tab.active::before{
      opacity: 1;
      animation: sproutGrow .9s ease-in-out infinite;
    }

    /* tab 右上：搖擺小葉 */
    .tab.active::after{
      content:"🍃";
      position:absolute;
      right: 12px;
      top: 8px;
      opacity:.75;
      animation: leafWiggle 1.2s ease-in-out infinite;
      pointer-events:none;
    }

    @keyframes sproutGrow{
      0%{ transform: translateY(-50%) rotate(0deg) scale(1); }
      50%{ transform: translateY(-58%) rotate(10deg) scale(1.18); }
      100%{ transform: translateY(-50%) rotate(0deg) scale(1); }
    }

    @keyframes leafWiggle{
      0%{ transform: translateY(0px) rotate(0deg); }
      50%{ transform: translateY(-4px) rotate(10deg); }
      100%{ transform: translateY(0px) rotate(0deg); }
    }

    /* 名單兩欄保持不變 */
    #uncheckList, #checkedList{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .student-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 10px 10px;
      border: 1px solid rgba(47,143,91,.18);
      background: rgba(255,255,255,.92);
      border-radius: 18px;
      font-size: 14px;
      box-shadow: 0 12px 18px rgba(31,111,71,.07);
      transition: .18s;
    }

    .student-row:hover{
      transform: translateY(-1px);
      box-shadow: 0 18px 26px rgba(31,111,71,.10);
    }

    .student-row span{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-weight: 900;
      color:#2c3b2f;
    }

    input[type="date"], input[type="password"]{
      width:100%;
      padding: 11px 12px;
      margin-top: 8px;
      border: 1px solid rgba(47,143,91,.22);
      border-radius: 16px;
      font-size: 16px;
      background: rgba(255,255,255,.88);
      outline:none;
      transition: .18s;
      box-shadow: 0 12px 18px rgba(31,111,71,.06);
    }

    input[type="date"]:focus, input[type="password"]:focus{
      border-color: rgba(47,143,91,.45);
      box-shadow: 0 0 0 5px rgba(47,143,91,.12);
    }

    .hidden{ display:none; }

    #status{
      text-align:center;
      margin-top: 14px;
      padding: 12px 10px;
      border-radius: 18px;
      font-weight: 900;
      min-height: 20px;
      border: 1px solid transparent;
    }

    .msg-success{
      background: rgba(47, 143, 91, .10);
      color: #0b4a2e;
      border-color: rgba(47, 143, 91, .22);
    }

    .msg-error{
      background: rgba(255, 77, 109, .10);
      color: #8a001a;
      border-color: rgba(255, 77, 109, .22);
    }

    .msg-loading{
      background: rgba(255, 232, 138, .22);
      color: #4a3b1b;
      border-color: rgba(255, 232, 138, .35);
      font-style: italic;
    }

    /* 小螢幕時保持兩欄，但更緊湊 */
    @media (max-width: 430px){
      .card{ padding: 18px 14px; border-radius: 22px; }
      h2{ font-size: 22px; }
      button{ border-radius: 16px; }
      .student-row{ border-radius: 16px; }
      .tab::before{ left: 10px; }
    }
  </style>
</head>

<body>
<div class="card">
  <h2>班級點名簿</h2>

  <div id="clubSelection">
    <p style="text-align:center;font-weight:900;">請選擇班級：</p>
    <div id="clubBtns" class="btn-grid">讀取中...</div>
  </div>

  <div id="mainPage" class="hidden">
    <button onclick="location.reload()" class="btn-back">
      <span class="label"><span class="ico">🍀</span>← 更換班級</span>
    </button>

    <h3 id="currentClubDisp" style="text-align:center;margin:6px 0 14px;color:#1f6f47;"></h3>

    <div class="tabs">
      <div id="tab1" class="tab active" onclick="switchTab('take')">點名/請假</div>
      <div id="tab2" class="tab" onclick="switchTab('query')">已點查詢</div>
    </div>

    <div class="section">
      <label><b>上課日期：</b></label>
      <input type="date" id="targetDate" onchange="refreshLists()">
    </div>

    <div id="takeAttendanceArea">
      <div class="section">
        <label><b>尚未處理學生：</b></label>
        <div id="uncheckList"></div>
      </div>

      <div class="btn-grid">
        <button id="btnSubmit" class="btn-submit" onclick="submitMulti('submit')">
          <span class="label"><span class="ico">🌸</span>出席點名</span>
        </button>

        <button id="btnLeave" class="btn-leave" onclick="submitMulti('leave')">
          <span class="label"><span class="ico">🌼</span>學生請假</span>
        </button>
      </div>
    </div>

    <div id="queryAttendanceArea" class="hidden">
      <div class="section">
        <label><b>名單確認 (*為請假)：</b></label>
        <div id="checkedList"></div>
        <button class="btn-danger" onclick="confirmDeleteAll()">
          <span class="label"><span class="ico">🪻</span>刪除此日期紀錄</span>
        </button>
      </div>
    </div>

    <div class="section">
      <label><b>驗證密碼：</b></label>
      <input type="password" id="adminPwd" placeholder="請輸入密碼">
    </div>

    <div id="status"></div>
  </div>
</div>

<script>
  // ⚠️ 請修改為你的 GAS API URL
  const API_URL = "https://script.google.com/macros/s/AKfycbzZgFi8KMaa2ZBRA1cQV7CG5zwCiWdhHld9ATBb_qxRteigIOFjdviaGk6Reb-JbfPDTw/exec";
  
  let curClub = "";
  let curMode = "take"; 

  window.onload = () => {
    fetchClubs();
    document.getElementById('targetDate').value = new Date().toISOString().split('T')[0];
  };

  async function fetchClubs() {
    try {
      const r = await fetch(`${API_URL}?action=getClubList`);
      const list = await r.json();
      const div = document.getElementById('clubBtns');
      div.innerHTML = "";
      list.forEach(c => {
        let b = document.createElement('button'); 
        b.className = "btn-club";
        b.innerHTML = `<span class="label"><span class="ico">🌷</span>${c}</span>`;
        b.onclick = () => { curClub = c; showMain(); };
        div.appendChild(b);
      });
    } catch(e) { showStatus("連線失敗", "error"); }
  }

  function showMain() {
    document.getElementById('clubSelection').classList.add('hidden');
    document.getElementById('mainPage').classList.remove('hidden');
    document.getElementById('currentClubDisp').innerText = "班級：" + curClub;
    refreshLists();
  }

  function switchTab(m) {
    curMode = m;
    document.getElementById('tab1').className = m === 'take' ? 'tab active' : 'tab';
    document.getElementById('tab2').className = m === 'query' ? 'tab active' : 'tab';
    document.getElementById('takeAttendanceArea').className = m === 'take' ? '' : 'hidden';
    document.getElementById('queryAttendanceArea').className = m === 'query' ? '' : 'hidden';
    clearStatus(); refreshLists();
  }

  async function refreshLists() {
    const date = document.getElementById('targetDate').value;
    if(!curClub || !date) return;
    document.getElementById('uncheckList').innerHTML = "<p style='grid-column:span 2;text-align:center;'>載入中...</p>";
    document.getElementById('checkedList').innerHTML = "<p style='grid-column:span 2;text-align:center;'>載入中...</p>";
    try {
      const [r1, r2] = await Promise.all([
        fetch(`${API_URL}?action=getStudents&clubName=${encodeURIComponent(curClub)}&date=${date}&mode=unchecked`),
        fetch(`${API_URL}?action=getStudents&clubName=${encodeURIComponent(curClub)}&date=${date}&mode=checked`)
      ]);
      renderList('uncheckList', await r1.json(), 'checkbox');
      renderList('checkedList', await r2.json(), 'delete');
    } catch(e) { showStatus("讀取失敗", "error"); }
  }

  function renderList(id, data, type) {
    const container = document.getElementById(id);
    if (!data.length) {
      container.innerHTML = "<p style='grid-column:span 2;color:gray;text-align:center;font-size:14px;'>無資料</p>";
      return;
    }
    container.innerHTML = "";
    data.forEach(nameText => {
      let d = document.createElement('div'); d.className = "student-row";
      if(type === 'checkbox') {
        d.innerHTML = `<span>${nameText}</span><input type="checkbox" name="stu" value="${nameText}" style="transform:scale(1.2);">`;
      } else {
        const cleanName = nameText.replace('*', '');
        d.innerHTML = `<span>${nameText}</span><button class="btn-outline-danger" onclick="deleteSingle('${cleanName}')">刪除</button>`;
      }
      container.appendChild(d);
    });
  }

  function showStatus(msg, type) {
    const s = document.getElementById('status'); 
    s.innerText = msg; 
    s.className = "";
    if (type === "success") s.classList.add('msg-success');
    else if (type === "error") s.classList.add('msg-error');
    else s.classList.add('msg-loading');
  }

  function clearStatus() { 
    document.getElementById('status').innerText = ""; 
    document.getElementById('status').className = ""; 
  }

  async function callPost(data) {
    const pwd = document.getElementById('adminPwd').value;
    if(!pwd) return showStatus("請輸入驗證密碼", "error");
    showStatus("處理中...", "loading");
    try {
      const r = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({...data, clubName: curClub, password: pwd, date: document.getElementById('targetDate').value})
      });
      const res = await r.json();
      if(res.status === 'success') {
        showStatus(res.message, "success");
        document.getElementById('adminPwd').value = "";
        setTimeout(refreshLists, 1000);
      } else showStatus(res.message, "error");
    } catch(e) { showStatus("連線錯誤", "error"); }
  }

  function submitMulti(act) {
    const box = document.querySelectorAll('input[name="stu"]:checked');
    const stuList = Array.from(box).map(b => b.value);
    if(!stuList.length) return showStatus("請勾選學生", "error");
    callPost({ action: act, students: stuList });
  }

  function deleteSingle(name) {
    if(!document.getElementById('adminPwd').value) return showStatus("請先輸入密碼再刪除", "error");
    callPost({ action: 'deleteSingle', studentName: name });
  }

  function confirmDeleteAll() {
    if(!document.getElementById('adminPwd').value) return showStatus("請先輸入密碼", "error");
    if(confirm("確定刪除此日期整欄紀錄嗎？")) callPost({ action: 'deleteAll' });
  }
</script>
</body>
</html>
